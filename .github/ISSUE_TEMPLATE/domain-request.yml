name: Domain Request
description: Request a domain to be added to the blocklist
title: "[Domain Request] "
labels: ["domain-request"]
body:
  - type: input
    id: domain
    attributes:
      label: Domain
      description: The domain you want to block
      placeholder: example-tracker.com
    validations:
      required: true

  - type: dropdown
    id: action
    attributes:
      label: Action
      description: Do you want to add or remove this domain?
      options:
        - Add
        - Remove
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which list should this domain be added to?
      options:
        - Tracker & Ads (tracker.txt)
        - Scam & Phishing (scam.txt)
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why should this domain be blocked? Add a source if possible.
      placeholder: "This domain tracks user behavior / is a known phishing domain. Source: ..."
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have verified this domain is not a legitimate service
          required: true
        - label: I have checked that this domain is not already in the lists
          required: true